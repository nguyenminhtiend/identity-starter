# Local development:
#   docker compose up postgres redis       # Infra only (run server with: pnpm --filter server dev)
#   docker compose up                      # Full stack (Postgres + Redis + migrations + server)

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: identity_start
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/docker/init-uuidv7.sql:/docker-entrypoint-initdb.d/01-uuidv7.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d identity_start"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    entrypoint: ["sh", "./scripts/migrate.sh"]
    environment:
      DATABASE_URL: postgresql://admin:123456@postgres:5432/identity_start
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://admin:123456@postgres:5432/identity_start
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      WEBAUTHN_RP_NAME: Identity Starter
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ORIGIN: http://localhost:3000
      JWT_ISSUER: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
  redisdata:
