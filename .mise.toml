[tools]
node = "24.14.0"
pnpm = "10.32.1"

# ── Dev ──────────────────────────────────────────────────
[tasks.dev]
description = "Start all apps in dev mode (turbo)"
run = "pnpm dev"

[tasks."dev:server"]
description = "Start API server in dev mode"
run = "pnpm --filter @identity-starter/server dev"

[tasks."dev:web"]
description = "Start web app in dev mode"
run = "pnpm --filter @identity-starter/web dev"

[tasks."dev:admin"]
description = "Start admin app in dev mode"
run = "pnpm --filter @identity-starter/admin dev"

# ── Build ────────────────────────────────────────────────
[tasks.build]
description = "Build all packages"
run = "pnpm build"

[tasks."build:server"]
description = "Build the API server"
run = "pnpm --filter @identity-starter/server build"

[tasks."build:web"]
description = "Build the web app"
run = "pnpm --filter @identity-starter/web build"

# ── Test ─────────────────────────────────────────────────
[tasks.test]
description = "Run all tests"
run = "pnpm test"

[tasks."test:unit"]
description = "Run unit tests (server)"
run = "pnpm --filter @identity-starter/server test:unit"

[tasks."test:integration"]
description = "Run integration tests (server)"
run = "pnpm --filter @identity-starter/server test:integration"

[tasks."test:watch"]
description = "Run unit tests in watch mode (server)"
run = "pnpm --filter @identity-starter/server test:watch"

[tasks."test:e2e"]
description = "Run Playwright e2e tests (web)"
run = "pnpm --filter @identity-starter/web e2e"

# ── Database ─────────────────────────────────────────────
[tasks."db:migrate"]
description = "Run database migrations"
run = "pnpm db:migrate"

[tasks."db:seed"]
description = "Seed database (roles, permissions, admin user)"
run = "pnpm db:seed"

[tasks."db:generate"]
description = "Generate migrations from schema changes"
run = "pnpm db:generate"

# ── Lint / Format ───────────────────────────────────────
[tasks.lint]
description = "Lint all files (biome check)"
run = "pnpm lint"

[tasks."lint:fix"]
description = "Lint and auto-fix all files"
run = "pnpm lint:fix"

# ── Typecheck ───────────────────────────────────────────
[tasks.typecheck]
description = "Type-check all packages"
run = "pnpm typecheck"

[tasks."typecheck:server"]
description = "Type-check the API server"
run = "pnpm --filter @identity-starter/server typecheck"

# ── Per-package shortcuts ───────────────────────────────
[tasks."server"]
description = "Run any script in server (usage: mise run server <script>)"
run = "pnpm --filter @identity-starter/server"

[tasks."web"]
description = "Run any script in web (usage: mise run web <script>)"
run = "pnpm --filter @identity-starter/web"

[tasks."db"]
description = "Run any script in db (usage: mise run db <script>)"
run = "pnpm --filter @identity-starter/db"

# ── Docker ──────────────────────────────────────────────
[tasks."docker:up"]
description = "Start Postgres + Redis (infra only)"
run = "docker compose up postgres redis -d"

[tasks."docker:down"]
description = "Stop all docker services"
run = "docker compose down"

[tasks."docker:full"]
description = "Start full stack via docker compose"
run = "docker compose up -d"

# ── Misc ────────────────────────────────────────────────
[tasks.install]
description = "Install dependencies"
run = "pnpm install"

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf apps/server/dist apps/web/.next packages/*/dist node_modules/.cache"
